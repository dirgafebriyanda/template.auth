<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      href="/assets/img/logo/nuanxa-favicon.png"
    />
    <title>Nuanxa - Auth</title>
    <link
      rel="stylesheet"
      href="/assets/fontawesome-free-7.0.1-web/css/all.min.css"
    />
    <link rel="stylesheet" href="/assets/css/style.css" />
    <script>
      // Pastikan fungsi applyTheme dan inisialisasi tema tetap ada
      function applyTheme(theme) {
        if (theme === "dark") {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      }

      let current = localStorage.theme;
      if (!current) {
        current = window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light";
        localStorage.theme = current;
      }

      applyTheme(current);
    </script>
  </head>
  <body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-50">
    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
      <nav
        class="flex justify-between flex-row items-center bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 shadow-md shadow-blue-200 dark:shadow-gray-700 rounded-2xl mb-6 p-3"
      >
        <a href="#" class="flex items-center gap-1 w-24">
          <img
            src="/assets/img/logo/nuanxa-dark.png"
            class="hidden dark:block"
            alt="Logo Dark"
          />
          <img
            src="/assets/img/logo/nuanxa-light.png"
            class="dark:hidden block"
            alt="Logo Light"
          />
        </a>
        <div class="space-x-3 items-center hidden md:block">
          <a
            href="#"
            class="text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100"
            >Dashboard</a
          >
          <button
            type="button"
            onclick="showLogin()"
            class="text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100"
          >
            Login
          </button>
          <button
            type="button"
            onclick="showRegister()"
            class="text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100"
          >
            Register
          </button>
        </div>
        <div class="flex items-center">
          <label
            for="theme-toggle"
            class="relative w-9 h-5 bg-gray-800 dark:bg-white rounded-full p-2 cursor-pointer"
          >
            <i
              id="theme-icon"
              class="absolute top-0 left-0 text-sm text-white dark:text-gray-800 transition-transform duration-200 translate-x-0"
            ></i>
          </label>
          <input type="checkbox" id="theme-toggle" class="sr-only" />
        </div>
      </nav>

      <div
        class="flex justify-center bg-white overflow-hidden dark:bg-gray-800 border border-gray-300 dark:border-gray-700 shadow-md shadow-blue-200 dark:shadow-gray-700 rounded-2xl"
      >
        <div class="lg:grid lg:grid-cols-2 w-full max-h-[30rem] relative">
          <div
            id="image"
            class="hidden relative lg:flex justify-center items-center w-full transition-transform duration-500 ease-in-out z-20"
          >
            <img
              src="/assets/img/light-owl.png"
              alt=""
              class="w-full h-full object-cover object-center block dark:hidden dark:brightness-50 brightness-100"
            />
            <img
              src="/assets/img/dark-owlix.png"
              alt=""
              class="w-full h-full object-cover object-center hidden dark:block dark:brightness-50 brightness-100"
            />
            <div
              class="absolute top-14 flex flex-col justify-center text-center p-6"
            >
              <div id="textLogin">
                <h1
                  class="text-3xl font-bold text-gray-900 dark:text-white drop-shadow-lg"
                >
                  Welcome Back
                </h1>
                <p
                  class="text-base font-semibold text-gray-600 dark:text-white/80 drop-shadow-lg"
                >
                  Enter your credentials to proceed
                </p>
              </div>
              <div id="textRegister" class="hidden">
                <h1
                  class="text-3xl font-bold text-gray-900 dark:text-white drop-shadow-lg"
                >
                  Get Started
                </h1>
                <p
                  class="text-base font-semibold text-gray-600 dark:text-white/80 drop-shadow-lg"
                >
                  Create an account to access the platform
                </p>
              </div>
            </div>
          </div>

          <div
            id="login"
            class="p-4 md:px-10 md:py-8 lg:px-20 lg:py-8 w-full lg:w-1/2 absolute translate-x-full opacity-100 transition-transform duration-500 ease-in-out"
          >
            <h1 class="text-xl font-bold text-center pb-5">Login</h1>
            <form>
              <div class="mb-5 relative autofill-light dark:autofill-dark">
                <i
                  class="fas fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500"
                ></i>

                <input
                  type="email"
                  id="emailLogin"
                  required
                  placeholder=" "
                  class="peer w-full pl-10 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-1 focus:ring-blue-200 focus:border-blue-200"
                />

                <label
                  for="emailLogin"
                  class="absolute left-10 top-2 px-1 text-gray-500 dark:text-gray-400 transition-[top,transform,font-size] pointer-events-none peer-placeholder-shown:top-2 peer-placeholder-shown:text-base peer-focus:-top-3 peer-focus:text-sm peer-[&:not(:placeholder-shown)]:-top-3 peer-[&:not(:placeholder-shown)]:text-sm peer-focus:left-2 peer-[&:not(:placeholder-shown)]:left-2 bg-white dark:bg-gray-800"
                >
                  Email
                </label>
              </div>

              <div class="mb-5 relative autofill-light dark:autofill-dark">
                <i
                  class="fas fa-key absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500"
                ></i>
                <input
                  type="password"
                  id="passwordLogin"
                  required
                  placeholder=" "
                  class="peer w-full pl-10 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-1 focus:ring-blue-200 focus:border-blue-200"
                />
                <i
                  data-toggle="password"
                  data-target="passwordLogin"
                  class="fas fa-eye-slash absolute right-2 top-1/2 -translate-y-1/2 cursor-pointer text-gray-400 dark:text-gray-500 hover:text-gray-600 hover:dark:text-gray-300"
                ></i>
                <label
                  for="passwordLogin"
                  class="absolute left-10 top-2 px-1 text-gray-500 dark:text-gray-400 transition-[top,transform,font-size] pointer-events-none peer-placeholder-shown:top-2 peer-placeholder-shown:text-base peer-focus:-top-3 peer-focus:text-sm peer-[&:not(:placeholder-shown)]:-top-3 peer-[&:not(:placeholder-shown)]:text-sm peer-focus:left-2 peer-[&:not(:placeholder-shown)]:left-2 bg-white dark:bg-gray-800"
                >
                  Password
                </label>
              </div>

              <div
                class="flex items-center justify-between text-sm text-gray-600 dark:text-gray-400 mb-5"
              >
                <label class="flex items-center gap-2">
                  <input
                    type="checkbox"
                    class="h-4 w-4 rounded border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-blue-200 focus:ring-offset-0"
                  />
                  Remember me
                </label>
                <a
                  href="#"
                  class="text-blue-600 dark:text-blue-400 hover:underline"
                  >Forgot password?</a
                >
              </div>

              <button
                type="submit"
                class="w-full px-3 py-2 mb-3 text-sm font-semibold rounded-lg text-white bg-gradient-to-tl from-indigo-600 to-blue-500 hover:from-indigo-700 hover:to-blue-600 dark:from-indigo-500 dark:to-blue-400 dark:hover:from-indigo-400 dark:hover:to-blue-300 transition"
              >
                Login
              </button>

              <div class="flex items-center mb-3">
                <div
                  class="flex-grow border-t border-gray-300 dark:border-gray-600"
                ></div>
                <span class="px-3 text-sm text-gray-500 dark:text-gray-400"
                  >OR</span
                >
                <div
                  class="flex-grow border-t border-gray-300 dark:border-gray-600"
                ></div>
              </div>

              <div class="flex gap-3 mb-4">
                <!-- Google -->
                <a
                  href="#"
                  class="flex items-center justify-center gap-2 w-1/2 px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600 text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition"
                >
                  <img
                    src="/assets/img/logo/google-icon.png"
                    class="w-5 h-5"
                    alt="Google"
                  />
                  Google
                </a>

                <!-- Facebook -->
                <a
                  href="#"
                  class="flex items-center justify-center gap-2 w-1/2 px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600 text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition"
                >
                  <img
                    src="/assets/img/logo/facebook-icon.png"
                    class="w-5 h-5"
                    alt="Facebook"
                  />
                  Facebook
                </a>
              </div>

              <div class="text-sm text-gray-500 dark:text-gray-400 text-center">
                Don’t have an account?
                <button
                  type="button"
                  onclick="showRegister()"
                  class="text-blue-600 dark:text-blue-400 hover:underline"
                >
                  Register
                </button>
              </div>
            </form>
          </div>

          <div
            id="register"
            class="p-4 md:px-10 md:py-8 lg:px-20 lg:py-8 w-full lg:w-1/2 lg:absolute translate-x-full opacity-0 transition-transform duration-500 ease-in-out"
          >
            <h1 class="text-xl font-bold text-center pb-5">Register</h1>
            <form>
              <!-- Email -->
              <div class="mb-5 relative autofill-light dark:autofill-dark">
                <i
                  class="fas fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500"
                ></i>

                <input
                  type="email"
                  id="emailRegister"
                  required
                  placeholder=" "
                  class="peer w-full pl-10 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-1 focus:ring-blue-200 focus:border-blue-200"
                />

                <label
                  for="emailRegister"
                  class="absolute left-10 top-2 px-1 text-gray-500 dark:text-gray-400 transition-[top,transform,font-size] pointer-events-none peer-placeholder-shown:top-2 peer-placeholder-shown:text-base peer-focus:-top-3 peer-focus:text-sm peer-[&:not(:placeholder-shown)]:-top-3 peer-[&:not(:placeholder-shown)]:text-sm peer-focus:left-2 peer-[&:not(:placeholder-shown)]:left-2 bg-white dark:bg-gray-800"
                >
                  Email
                </label>
              </div>

              <!-- Password -->
              <div class="mb-5 relative autofill-light dark:autofill-dark">
                <i
                  class="fas fa-key absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500"
                ></i>
                <input
                  type="password"
                  id="passwordRegister"
                  required
                  placeholder=" "
                  class="peer w-full pl-10 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-1 focus:ring-blue-200 focus:border-blue-200"
                />
                <i
                  data-toggle="password"
                  data-target="passwordRegister"
                  class="fas fa-eye-slash absolute right-2 top-1/2 -translate-y-1/2 cursor-pointer text-gray-400 dark:text-gray-500 hover:text-gray-600 hover:dark:text-gray-300"
                ></i>
                <label
                  for="passwordRegister"
                  class="absolute left-10 top-2 px-1 text-gray-500 dark:text-gray-400 transition-[top,transform,font-size] pointer-events-none peer-placeholder-shown:top-2 peer-placeholder-shown:text-base peer-focus:-top-3 peer-focus:text-sm peer-[&:not(:placeholder-shown)]:-top-3 peer-[&:not(:placeholder-shown)]:text-sm peer-focus:left-2 peer-[&:not(:placeholder-shown)]:left-2 bg-white dark:bg-gray-800"
                >
                  Password
                </label>
              </div>

              <!-- Terms and Conditions -->
              <div
                class="flex items-center text-sm text-gray-600 dark:text-gray-400 mb-5"
              >
                <label class="flex items-center gap-2">
                  <input
                    type="checkbox"
                    class="h-4 w-4 rounded border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-blue-200 focus:ring-offset-0"
                  />
                  I agree to the
                  <a
                    href="#"
                    class="text-blue-600 dark:text-blue-400 hover:underline"
                    >Terms & Conditions</a
                  >
                </label>
              </div>

              <button
                type="submit"
                class="w-full px-3 py-2 mb-3 text-sm font-semibold rounded-lg text-white bg-gradient-to-tl from-indigo-600 to-blue-500 hover:from-indigo-700 hover:to-blue-600 dark:from-indigo-500 dark:to-blue-400 dark:hover:from-indigo-400 dark:hover:to-blue-300 transition"
              >
                Register
              </button>

              <div class="flex items-center mb-3">
                <div
                  class="flex-grow border-t border-gray-300 dark:border-gray-600"
                ></div>
                <span class="px-3 text-sm text-gray-500 dark:text-gray-400"
                  >OR</span
                >
                <div
                  class="flex-grow border-t border-gray-300 dark:border-gray-600"
                ></div>
              </div>

              <div class="flex gap-3 mb-4">
                <!-- Google -->
                <a
                  href="#"
                  class="flex items-center justify-center gap-2 w-1/2 px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600 text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition"
                >
                  <img
                    src="/assets/img/logo/google-icon.png"
                    class="w-5 h-5"
                    alt="Google"
                  />
                  Google
                </a>

                <!-- Facebook -->
                <a
                  href="#"
                  class="flex items-center justify-center gap-2 w-1/2 px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600 text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition"
                >
                  <img
                    src="/assets/img/logo/facebook-icon.png"
                    class="w-5 h-5"
                    alt="Facebook"
                  />
                  Facebook
                </a>
              </div>

              <div class="text-sm text-gray-500 dark:text-gray-400 text-center">
                Already have an account?
                <button
                  type="button"
                  onclick="showLogin()"
                  class="text-blue-600 dark:text-blue-400 hover:underline"
                >
                  Login
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const image = document.getElementById("image");
        const login = document.getElementById("login");
        const register = document.getElementById("register");
        const textRegister = document.getElementById("textRegister");
        const textLogin = document.getElementById("textLogin");
        const media = window.matchMedia("(max-width: 1024px)");

        let currentPage = "login";

        function setupMode() {
          if (media.matches) {
            login.classList.remove("translate-x-full");
            register.classList.remove("opacity-0");
            login.classList.remove("opacity-0");

            window.showLogin = function () {
              currentPage = "login";

              login.classList.remove("-translate-x-full");
              login.classList.add("translate-x-0");
              register.classList.add("translate-x-full");
              register.classList.remove("translate-x-0");
            };

            window.showRegister = function () {
              currentPage = "register";

              login.classList.remove("translate-x-0");
              login.classList.add("-translate-x-full");
              register.classList.remove("translate-x-full");
              register.classList.add("translate-x-0");
            };
          } else {
            window.showLogin = function () {
              currentPage = "login";

              image.classList.remove("translate-x-full");
              login.classList.add("translate-x-full");
              register.classList.add("translate-x-full");
              textLogin.classList.remove("hidden");
              textRegister.classList.add("hidden");

              setTimeout(() => {
                login.classList.add("opacity-100", "z-10");
                login.classList.remove("opacity-0");

                register.classList.remove("opacity-100", "z-10");
                register.classList.add("opacity-0");
              }, 100);
            };

            window.showRegister = function () {
              currentPage = "register";

              image.classList.add("translate-x-full");
              login.classList.remove("translate-x-full");
              register.classList.remove("translate-x-full");
              textLogin.classList.add("hidden");
              textRegister.classList.remove("hidden");

              setTimeout(() => {
                login.classList.remove("opacity-100", "z-10");
                login.classList.add("opacity-0");

                register.classList.add("opacity-100", "z-10");
                register.classList.remove("opacity-0");
              }, 100);
            };
          }

          currentPage === "login" ? showLogin() : showRegister();
        }

        setupMode();

        media.addEventListener("change", setupMode);
      });
    </script>

    <script src="/assets/js/script.js"></script>
  </body>
</html>
